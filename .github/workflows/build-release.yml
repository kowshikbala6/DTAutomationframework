name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Release Package

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Verify Java Installation
        run: |
          echo "Java version:"
          java -version
          echo "JAVA_HOME: $JAVA_HOME"
          echo "Maven version:"
          mvn -version

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Create Release Notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "## Release $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "### What's New" >> release_notes.md
          echo "- Enhanced test automation framework" >> release_notes.md
          echo "- Improved reporting capabilities" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Build Information" >> release_notes.md
          echo "- Java: 11" >> release_notes.md
          echo "- Maven: 3.8.1+" >> release_notes.md
          echo "- Build Date: $(date)" >> release_notes.md

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ steps.release_notes.outputs.version }}
          path: target/*.jar
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: release_notes.md
          files: target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release Summary
        run: |
          echo "## 🎉 Release Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ steps.release_notes.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts uploaded and GitHub Release created!" >> $GITHUB_STEP_SUMMARY
