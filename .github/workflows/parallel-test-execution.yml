name: Parallel Test Execution

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - framework-verification
          - login-config
          - parabank-ui

jobs:
  parallel-tests:
    runs-on: ubuntu-latest
    name: Execute Tests in Parallel

    strategy:
      matrix:
        test-suite:
          - BankingFrameworkVerificationTest
          - BankingLoginTest
          - ParaBankUITest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run ${{ matrix.test-suite }}
        run: mvn test -Dtest=${{ matrix.test-suite }} -Dmaven.test.failure.ignore=true
        continue-on-error: true

      - name: Upload Results for ${{ matrix.test-suite }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test-suite }}
          path: target/surefire-reports/
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.test-suite }}
          path: allure-results/
          retention-days: 30

  merge-reports:
    name: Merge and Report Results
    runs-on: ubuntu-latest
    needs: parallel-tests
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge test results
        run: |
          mkdir -p merged-results
          find artifacts -name "*.xml" -type f -exec cp {} merged-results/ \;
          echo "Merged test result files:"
          ls -la merged-results/

      - name: Generate combined Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: artifacts
          allure_history: allure-history
          keep_reports: 20

      - name: Upload merged Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: merged-allure-report
          path: allure-report/
          retention-days: 30

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Framework Verification | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Login Config | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ParaBank UI | ✅ |" >> $GITHUB_STEP_SUMMARY
