stages:
  - build
  - test
  - quality
  - report

image: maven:3.8.1-openjdk-11

variables:
  MAVEN_OPTS: "-Xmx1024m"
  MAVEN_CLI_OPTS: "-s .m2/settings.xml -q"

build:
  stage: build
  script:
    - echo "Building Banking Automation Framework..."
    - mvn clean compile $MAVEN_CLI_OPTS
  artifacts:
    paths:
      - target/
    expire_in: 1 hour
  cache:
    paths:
      - .m2/

test:
  stage: test
  script:
    - echo "Running Banking Automation Framework tests..."
    - mvn test -Dmaven.test.failure.ignore=true $MAVEN_CLI_OPTS
  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/**/*.xml
    paths:
      - target/surefire-reports/
      - allure-results/
    expire_in: 30 days
  cache:
    paths:
      - .m2/

quality:
  stage: quality
  script:
    - echo "Running code quality checks..."
    - mvn verify -DskipTests $MAVEN_CLI_OPTS
    # Uncomment for SonarQube integration:
    # - mvn sonar:sonar -Dsonar.projectKey=banking-automation -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN
  cache:
    paths:
      - .m2/
  allow_failure: true

allure:
  stage: report
  image: maven:3.8.1-openjdk-11
  script:
    - echo "Generating Allure report..."
    - mvn allure:report $MAVEN_CLI_OPTS || true
  artifacts:
    when: always
    paths:
      - allure-report/
      - target/site/allure-report/
    expire_in: 90 days
  cache:
    paths:
      - .m2/
  allow_failure: true

